<!DOCTYPE html>
<html>
<head>
    <title>Debug Test</title>
</head>
<body>
    <h1>Debug Test</h1>
    <p>This page tests if JavaScript is working.</p>
    
    <button onclick="testClick()">Test Button</button>
    <div id="result"></div>

    <script>
        console.log('JavaScript is loaded!');
        
        function testClick() {
            console.log('Button was clicked!');
            document.getElementById('result').innerHTML = 'Button clicked at: ' + new Date().toLocaleTimeString();
        }
        
        // Test on page load
        window.onload = function() {
            console.log('Page loaded!');
            document.getElementById('result').innerHTML = 'Page loaded at: ' + new Date().toLocaleTimeString();
        };
    </script>
</body>
</html>
