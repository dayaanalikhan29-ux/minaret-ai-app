<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minaret AI - Islamic Guidance</title>
  <link rel="stylesheet" href="ai-style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="top-bar">
    <a href="index.html" class="back-btn" aria-label="Back to homepage">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>
    <div class="title-group">
      <h1>Minaret AI</h1>
      <p class="subtitle">Your Islamic AI Assistant</p>
    </div>
  </header>
  
  <main class="chat-main">
    <div class="chatbox" id="chatbox">
      <div class="bubble ai-bubble">
        <span class="bubble-text">
          <span class="arabic-greeting">السلام عليكم ورحمة الله وبركاته</span><br>
          <span class="english-greeting">Peace be upon you and God's mercy and blessings.</span><br><br>
          I'm here to help you learn about Islam and provide guidance. Ask me anything about Islamic teachings, practices, or any questions you may have.
        </span>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator" style="display:none;">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </main>
  
  <form class="input-bar" id="chatForm" autocomplete="off">
    <input 
      type="text" 
      id="userInput" 
      placeholder="Ask about Islam, prayer, Quran, or anything..." 
      required 
      autocomplete="off"
      aria-label="Type your question"
    >
    <button type="submit" id="sendBtn" aria-label="Send message">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </form>
  
  <script src="ai-script.js"></script>
</body>
</html> 
</html>
